server:
  port: 9090

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/scrumplanner
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
management:
  endpoints:
    web:
      base-path: /status
      exposure:
        include: health, info
